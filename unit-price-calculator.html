<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Price Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f1f5f9;
      --text:        #1e293b;
      --text-head:   #0f172a;
      --text-sub:    #64748b;
      --card-bg:     #fff;
      --card-border: rgba(0,0,0,0.04);
      --card-shadow: rgba(0,0,0,0.07);
      --divider:     #f1f5f9;
      --col-lbl:     #94a3b8;
      --row-hover:   #f8fafc;
      --input-bg:    #fff;
      --input-bd:    #e2e8f0;
      --input-text:  #1e293b;
      --input-ph:    #c8d0dc;
      --ord-bg:      #fff;
      --ord-bd:      #e2e8f0;
      --ord-hover:   #f1f5f9;
      --ord-hvbd:    #cbd5e1;
      --ord-hvcol:   #475569;
      --up-text:     #0f172a;
      --up-na:       #94a3b8;
      --up-wait:     #c8d0dc;
      --cp-bg:       #fff;
      --cp-bd:       #e2e8f0;
      --cp-hover:    #f1f5f9;
      --del-hover:   #fff1f2;
      --add-bd:      #e2e8f0;
      --add-col:     #94a3b8;
      --tc-bg:       #f8fafc;
      --tc-bd:       #e2e8f0;
      --tc-text:     #334155;
      --tc-empty:    #c8d0dc;
      --btn-tc-bg:   #1e293b;
      --btn-tc-hv:   #0f172a;
    }

    body.dark {
      --bg:          #0f172a;
      --text:        #e2e8f0;
      --text-head:   #f1f5f9;
      --text-sub:    #64748b;
      --card-bg:     #1e293b;
      --card-border: rgba(255,255,255,0.04);
      --card-shadow: rgba(0,0,0,0.35);
      --divider:     #1e3a5f20;
      --col-lbl:     #475569;
      --row-hover:   #162032;
      --input-bg:    #162032;
      --input-bd:    #334155;
      --input-text:  #e2e8f0;
      --input-ph:    #3f536e;
      --ord-bg:      #162032;
      --ord-bd:      #334155;
      --ord-hover:   #1e3a5f;
      --ord-hvbd:    #4a6fa5;
      --ord-hvcol:   #93c5fd;
      --up-text:     #f1f5f9;
      --up-na:       #475569;
      --up-wait:     #334155;
      --cp-bg:       #162032;
      --cp-bd:       #334155;
      --cp-hover:    #1e3a5f;
      --del-hover:   #2d1a1a;
      --add-bd:      #334155;
      --add-col:     #475569;
      --tc-bg:       #162032;
      --tc-bd:       #334155;
      --tc-text:     #cbd5e1;
      --tc-empty:    #334155;
      --btn-tc-bg:   #6366f1;
      --btn-tc-hv:   #4f46e5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem 1.5rem 5rem;
      transition: background 0.25s, color 0.25s;
    }

    .wrap { max-width: 1140px; margin: 0 auto; }

    /* ── Page Header ── */
    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 2rem;
    }
    .page-header-text h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text-head);
    }
    .page-header-text p {
      margin-top: 0.3rem;
      font-size: 0.875rem;
      color: var(--text-sub);
    }

    /* ── Dark mode toggle ── */
    .btn-dark {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.45rem 0.85rem;
      background: var(--card-bg);
      border: 1.5px solid var(--input-bd);
      border-radius: 99px;
      cursor: pointer;
      font-size: 0.8125rem; font-weight: 500; font-family: inherit;
      color: var(--text-sub);
      flex-shrink: 0; margin-top: 0.2rem;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .btn-dark:hover { border-color: var(--ord-hvbd); color: var(--text); }
    .btn-dark .icon-sun  { display: none; }
    .btn-dark .icon-moon { display: block; }
    body.dark .btn-dark .icon-sun  { display: block; }
    body.dark .btn-dark .icon-moon { display: none; }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: 14px;
      box-shadow: 0 1px 3px var(--card-shadow), 0 0 0 1px var(--card-border);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      transition: background 0.25s, box-shadow 0.25s;
    }
    .card-head {
      display: flex;
      align-items: center;
      padding-bottom: 1rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--divider);
    }
    .card-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-head);
    }

    /* ── Column headers ── */
    .col-headers {
      display: grid;
      grid-template-columns: 50px 1fr 140px 170px 1fr 34px;
      margin-bottom: 0.25rem;
    }
    .col-lbl {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--col-lbl);
      padding: 0 0.1rem;
    }

    /* ── Product rows ── */
    #products-list { display: flex; flex-direction: column; gap: 0.2rem; }

    .product-row {
      display: grid;
      grid-template-columns: 50px 1fr 140px 170px 1fr 34px;
      padding: 0.35rem 0.25rem;
      border-radius: 8px;
      transition: background 0.12s;
    }
    .product-row:hover { background: var(--row-hover); }

    /* ── Order buttons ── */
    .order-btns { display: flex; flex-direction: column; align-items: center; gap: 3px; }

    .btn-ord {
      display: flex; align-items: center; justify-content: center;
      width: 22px; height: 20px;
      border: 1px solid var(--ord-bd); border-radius: 4px;
      background: var(--ord-bg); cursor: pointer; color: var(--col-lbl);
      font-size: 0.55rem; padding: 0;
      transition: all 0.12s;
    }
    .btn-ord:hover:not(:disabled) { background: var(--ord-hover); border-color: var(--ord-hvbd); color: var(--ord-hvcol); }
    .btn-ord:disabled { opacity: 0.2; cursor: not-allowed; }

    /* ── Inputs ── */
    .f-input {
      width: 100%; height: 36px;
      padding: 0 0.65rem;
      border: 1.5px solid var(--input-bd); border-radius: 7px;
      font-size: 0.875rem; color: var(--input-text);
      background: var(--input-bg); outline: none;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.25s, color 0.25s;
    }
    .f-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
    .f-input::placeholder { color: var(--input-ph); }

    /* ── Unit price cell ── */
    .up-cell { display: flex; align-items: center; gap: 0.4rem; min-height: 36px; }

    .up-val {
      flex: 1;
      font-size: 0.875rem; font-weight: 600; color: var(--up-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .up-val.na   { font-weight: 400; color: var(--up-na); font-style: italic; }
    .up-val.wait { font-weight: 400; color: var(--up-wait); }
    .up-val.err  { font-weight: 400; color: #f87171; font-size: 0.8rem; }

    .btn-copy-up {
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; width: 28px; height: 28px;
      border: 1px solid var(--cp-bd); border-radius: 5px;
      background: var(--cp-bg); cursor: pointer; color: var(--col-lbl);
      transition: all 0.12s;
    }
    .btn-copy-up:hover:not(:disabled) { background: var(--cp-hover); border-color: var(--ord-hvbd); color: var(--text); }
    .btn-copy-up:disabled { opacity: 0; pointer-events: none; }
    .btn-copy-up.ok { background: #ecfdf5; border-color: #6ee7b7; color: #10b981; }

    /* ── Delete button ── */
    .btn-del {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; margin: 0 auto;
      border: none; border-radius: 6px;
      background: none; cursor: pointer; color: var(--up-wait);
      font-size: 1.15rem; font-weight: 300;
      transition: all 0.12s;
    }
    .btn-del:hover { background: var(--del-hover); color: #f43f5e; }

    /* ── Add product button ── */
    .btn-add-row {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%; padding: 0.625rem;
      margin-top: 0.625rem;
      border: 1.5px dashed var(--add-bd); border-radius: 8px;
      background: none; cursor: pointer; color: var(--add-col);
      font-size: 0.875rem; font-family: inherit;
      transition: all 0.15s;
    }
    .btn-add-row:hover { border-color: #6366f1; color: #6366f1; background: #f5f3ff; }

    /* ── T&C ── */
    .tc-box {
      background: var(--tc-bg);
      border: 1px solid var(--tc-bd);
      border-radius: 8px;
      padding: 1rem 1.1rem;
      font-size: 0.875rem;
      line-height: 1.7;
      color: var(--tc-text);
      min-height: 64px;
      word-break: break-word;
      transition: background 0.25s, border-color 0.25s, color 0.25s;
    }
    .tc-box.empty { color: var(--tc-empty); font-style: italic; }

    .tc-footer { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.875rem; }

    .btn-copy-tc {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1rem;
      background: var(--btn-tc-bg); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.875rem; font-weight: 500; font-family: inherit;
      transition: background 0.15s;
    }
    .btn-copy-tc:hover { background: var(--btn-tc-hv); }
    .btn-copy-tc.ok { background: #10b981; }
    .btn-copy-tc:disabled { opacity: 0.4; cursor: default; }

    /* ── Divider row ── */
    .row-divider {
      height: 1px; background: var(--divider);
      margin: 0.35rem 0.25rem;
    }
  </style>
</head>
<body>

<div class="wrap">

  <header class="page-header">
    <div class="page-header-text">
      <h1>Unit Price Calculator</h1>
      <p>Enter products below. Unit prices are calculated per kg, per litre, or each.</p>
    </div>
    <button class="btn-dark" id="btn-dark" title="Toggle dark mode">
      <!-- Moon (shown in light mode) -->
      <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <!-- Sun (shown in dark mode) -->
      <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <span id="dark-label">Dark</span>
    </button>
  </header>

  <!-- Products card -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">Products</span>
    </div>

    <div class="col-headers">
      <div class="col-lbl"></div>
      <div class="col-lbl">Product Name</div>
      <div class="col-lbl">Retail Price</div>
      <div class="col-lbl">Unit Size</div>
      <div class="col-lbl">Unit Price</div>
      <div class="col-lbl"></div>
    </div>

    <div id="products-list"></div>

    <button class="btn-add-row" id="btn-add">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Product
    </button>
  </div>

  <!-- Terms & Conditions card -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">Terms &amp; Conditions</span>
    </div>
    <div id="tc-box" class="tc-box empty">Add products above to generate Terms &amp; Conditions text.</div>
    <div class="tc-footer">
      <button class="btn-copy-tc" id="btn-copy-tc" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        Copy to Clipboard
      </button>
    </div>
  </div>

</div>

<script>
/* ─────────────────────────────────────────────
   Data
───────────────────────────────────────────── */
let products = [];
let uid = 0;

function newProduct() {
  return { id: ++uid, name: '', unitSize: '', price: '' };
}

/* ─────────────────────────────────────────────
   Price display formatter
───────────────────────────────────────────── */
function formatPrice(amount) {
  if (amount < 1) {
    return Math.round(amount * 100) + 'p';
  }
  const str = amount.toFixed(2);
  return '£' + (str.endsWith('.00') ? str.slice(0, -3) : str);
}

/* ─────────────────────────────────────────────
   Parsing
───────────────────────────────────────────── */
function parsePrice(str) {
  if (!str) return null;
  const s = str.trim().replace(/\s/g, '').replace(/^£/, '');
  if (/^\d+(\.\d+)?p$/i.test(s)) {
    const v = parseFloat(s);
    return isNaN(v) ? null : v / 100;
  }
  const v = parseFloat(s);
  return isNaN(v) ? null : v;
}

function parseUnit(str) {
  if (!str || !str.trim()) return { type: 'empty' };
  const s = str.trim().toLowerCase();

  // Exact keywords — no unit price needed
  // 'each', 'set' and 'pair' show price as-is with their label
  if (s === 'each') return { type: 'p', qty: 1, label: 'each' };
  if (s === 'set')  return { type: 'p', qty: 1, label: 'per set' };
  if (s === 'pair') return { type: 'p', qty: 1, label: 'pair' };

  let m;

  // ── Weight ──
  m = s.match(/^([\d.]+)\s*kg$/);
  if (m) return { type: 'w', qty: +m[1],             label: 'per kg' };
  if (s === 'kg') return { type: 'w', qty: 1, label: 'per kg' };
  m = s.match(/^([\d.]+)\s*g$/);
  if (m) return { type: 'w', qty: +m[1] / 1e3,       label: 'per kg' };
  m = s.match(/^([\d.]+)\s*mg$/);
  if (m) return { type: 'w', qty: +m[1] / 1e6,       label: 'per kg' };
  m = s.match(/^([\d.]+)\s*lbs?$/);
  if (m) return { type: 'w', qty: +m[1] * 0.453592,  label: 'per kg' };
  m = s.match(/^([\d.]+)\s*oz$/);
  if (m) return { type: 'w', qty: +m[1] * 0.0283495, label: 'per kg' };

  // ── Volume ──
  m = s.match(/^([\d.]+)\s*(?:l|litre|litres)$/);
  if (m) return { type: 'v', qty: +m[1],              label: 'per litre' };
  if (s === 'litre' || s === 'litres') return { type: 'v', qty: 1, label: 'per litre' };
  m = s.match(/^([\d.]+)\s*ml$/);
  if (m) return { type: 'v', qty: +m[1] / 1e3,        label: 'per litre' };
  m = s.match(/^([\d.]+)\s*cl$/);
  if (m) return { type: 'v', qty: +m[1] / 100,        label: 'per litre' };
  m = s.match(/^([\d.]+)\s*fl\.?\s*oz$/);
  if (m) return { type: 'v', qty: +m[1] * 0.0284131,  label: 'per litre' };

  // ── Pack / count ──
  m = s.match(/^([\d.]+)\s*(?:pack|packs|pk|x)$/);
  if (m) return { type: 'p', qty: +m[1], label: 'each' };
  m = s.match(/^(?:pack|pk)\s*(?:of\s*)?([\d.]+)$/);
  if (m) return { type: 'p', qty: +m[1], label: 'each' };
  m = s.match(/^([\d.]+)\s*(?:pieces?|pcs?|items?)$/);
  if (m) return { type: 'p', qty: +m[1], label: 'each' };

  return { type: 'unknown' };
}

function calcUP(product) {
  const parsed = parseUnit(product.unitSize);
  if (parsed.type === 'none')    return { show: false };
  if (parsed.type === 'empty')   return { show: true, ready: false };
  if (parsed.type === 'unknown') return { show: true, ready: false, err: 'Unrecognised unit' };

  const price = parsePrice(product.price);
  if (price === null)  return { show: true, ready: false };
  if (!parsed.qty)     return { show: true, ready: false, err: 'Invalid size' };

  const raw     = price / parsed.qty;
  const floored = Math.round(raw * 100) / 100;
  const display = formatPrice(floored) + ' ' + parsed.label;

  return { show: true, ready: true, display, value: floored, label: parsed.label };
}

/* ─────────────────────────────────────────────
   SVG icon helpers
───────────────────────────────────────────── */
function iconCopy(size) {
  size = size || 12;
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
  </svg>`;
}
function iconCheck(size) {
  size = size || 12;
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
    <polyline points="20 6 9 17 4 12"></polyline>
  </svg>`;
}

/* ─────────────────────────────────────────────
   T&C builder
───────────────────────────────────────────── */
function buildTC() {
  const parts = products
    .filter(p => p.name.trim() || p.unitSize.trim())
    .map(p => {
      const up      = calcUP(p);
      const unitKey = p.unitSize.trim().toLowerCase();
      const isSet   = unitKey === 'set';
      const isEach  = unitKey === 'each';
      const isPair  = unitKey === 'pair';
      const is1litre = /^1\s*(?:l|litre|litres)$/.test(unitKey) || unitKey === 'litre' || unitKey === 'litres';
      const is1kg    = /^1\s*kg$/.test(unitKey) || unitKey === 'kg';
      const omitSize = isSet || isEach || isPair || is1litre || is1kg;
      const seg     = omitSize
        ? p.name.trim()
        : [p.name.trim(), p.unitSize.trim()].filter(Boolean).join(' ');
      if (isSet || isEach || isPair) {
        const price    = parsePrice(p.price);
        const priceStr = price !== null ? formatPrice(price) : '';
        const lbl      = isSet ? 'per set' : unitKey;
        return seg + (priceStr ? ', ' + priceStr + ' ' + lbl + '.' : '.');
      }
      if (up.show && up.ready) {
        const retailPrice = parsePrice(p.price);
        const omitRetail  = is1litre || is1kg;
        const retailStr   = (!omitRetail && retailPrice !== null) ? ', ' + formatPrice(retailPrice) : '';
        return seg + retailStr + ', ' + up.display + '.';
      }
      return seg + '.';
    });

  const box = document.getElementById('tc-box');
  const btn = document.getElementById('btn-copy-tc');

  if (parts.length === 0) {
    box.className = 'tc-box empty';
    box.textContent = 'Add products above to generate Terms & Conditions text.';
    btn.disabled = true;
  } else {
    box.className = 'tc-box';
    box.textContent = parts.join(' ');
    btn.disabled = false;
  }
}

/* ─────────────────────────────────────────────
   Row rendering
───────────────────────────────────────────── */
function renderUpCell(cell, product) {
  cell.innerHTML = '';
  const up = calcUP(product);

  const valEl = document.createElement('span');
  valEl.className = 'up-val';

  if (!up.show) {
    valEl.classList.add('na');
    valEl.textContent = 'N/A';
  } else if (up.err) {
    valEl.classList.add('err');
    valEl.textContent = up.err;
  } else if (!up.ready) {
    valEl.classList.add('wait');
    valEl.textContent = '—';
  } else {
    valEl.textContent = up.display;
  }

  const copyBtn = document.createElement('button');
  copyBtn.className = 'btn-copy-up';
  copyBtn.title = 'Copy unit price';
  copyBtn.innerHTML = iconCopy(12);
  copyBtn.disabled = !(up.show && up.ready);

  if (up.show && up.ready) {
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(up.display).then(() => {
        copyBtn.classList.add('ok');
        copyBtn.innerHTML = iconCheck(12);
        setTimeout(() => {
          copyBtn.classList.remove('ok');
          copyBtn.innerHTML = iconCopy(12);
        }, 1500);
      });
    });
  }

  cell.append(valEl, copyBtn);
}

function createRow(product, idx, total) {
  const row = document.createElement('div');
  row.className = 'product-row';
  row.dataset.id = product.id;

  /* Order buttons */
  const orderDiv = document.createElement('div');
  orderDiv.className = 'order-btns';

  const btnUp = document.createElement('button');
  btnUp.className = 'btn-ord';
  btnUp.title = 'Move up';
  btnUp.disabled = idx === 0;
  btnUp.innerHTML = '&#9650;';
  btnUp.dataset.action = 'up';

  const btnDn = document.createElement('button');
  btnDn.className = 'btn-ord';
  btnDn.title = 'Move down';
  btnDn.disabled = idx === total - 1;
  btnDn.innerHTML = '&#9660;';
  btnDn.dataset.action = 'down';

  orderDiv.append(btnUp, btnDn);

  /* Name input */
  const nameIn = document.createElement('input');
  nameIn.type = 'text';
  nameIn.className = 'f-input';
  nameIn.placeholder = 'Product name';
  nameIn.value = product.name;
  nameIn.dataset.field = 'name';

  /* Unit size input */
  const sizeIn = document.createElement('input');
  sizeIn.type = 'text';
  sizeIn.className = 'f-input';
  sizeIn.placeholder = 'e.g. 250g, 75cl, 6 pack';
  sizeIn.value = product.unitSize;
  sizeIn.dataset.field = 'unitSize';

  /* Price input */
  const priceIn = document.createElement('input');
  priceIn.type = 'text';
  priceIn.className = 'f-input';
  priceIn.placeholder = 'e.g. £1.49, 99p';
  priceIn.value = product.price;
  priceIn.dataset.field = 'price';

  /* Unit price cell */
  const upCell = document.createElement('div');
  upCell.className = 'up-cell';
  renderUpCell(upCell, product);

  /* Delete button */
  const delBtn = document.createElement('button');
  delBtn.className = 'btn-del';
  delBtn.title = 'Remove';
  delBtn.dataset.action = 'delete';
  delBtn.innerHTML = '&times;';

  row.append(orderDiv, nameIn, priceIn, sizeIn, upCell, delBtn);
  return row;
}

function renderAll() {
  const list = document.getElementById('products-list');
  list.innerHTML = '';
  products.forEach((p, i) => list.appendChild(createRow(p, i, products.length)));
  buildTC();
}

/* ─────────────────────────────────────────────
   Event delegation — products list
───────────────────────────────────────────── */
document.getElementById('products-list').addEventListener('input', function(e) {
  const row   = e.target.closest('.product-row');
  if (!row) return;
  const id    = +row.dataset.id;
  const field = e.target.dataset.field;
  if (!field) return;

  const p = products.find(x => x.id === id);
  if (!p) return;
  p[field] = e.target.value;

  // Only update unit-price cell + T&C (no full re-render keeps focus)
  if (field === 'unitSize' || field === 'price') {
    renderUpCell(row.querySelector('.up-cell'), p);
  }
  buildTC();
});

document.getElementById('products-list').addEventListener('click', function(e) {
  const row = e.target.closest('.product-row');
  if (!row) return;
  const id     = +row.dataset.id;
  const action = e.target.closest('[data-action]')?.dataset.action;
  if (!action) return;

  const idx = products.findIndex(x => x.id === id);
  if (idx === -1) return;

  if (action === 'delete') {
    products.splice(idx, 1);
    renderAll();
  } else if (action === 'up' && idx > 0) {
    [products[idx], products[idx - 1]] = [products[idx - 1], products[idx]];
    renderAll();
  } else if (action === 'down' && idx < products.length - 1) {
    [products[idx], products[idx + 1]] = [products[idx + 1], products[idx]];
    renderAll();
  }
});

/* ─────────────────────────────────────────────
   Add product button
───────────────────────────────────────────── */
document.getElementById('btn-add').addEventListener('click', () => {
  products.push(newProduct());
  renderAll();
  // Focus the name input of the new row
  const rows = document.querySelectorAll('.product-row');
  const last = rows[rows.length - 1];
  if (last) last.querySelector('.f-input')?.focus();
});

/* ─────────────────────────────────────────────
   Copy T&C button
───────────────────────────────────────────── */
document.getElementById('btn-copy-tc').addEventListener('click', function() {
  const text = document.getElementById('tc-box').textContent;
  navigator.clipboard.writeText(text).then(() => {
    this.classList.add('ok');
    this.innerHTML = iconCheck(14) + ' Copied!';
    setTimeout(() => {
      this.classList.remove('ok');
      this.innerHTML = iconCopy(14) + ' Copy to Clipboard';
    }, 2000);
  });
});

/* ─────────────────────────────────────────────
   Dark mode toggle
───────────────────────────────────────────── */
(function() {
  const btn   = document.getElementById('btn-dark');
  const label = document.getElementById('dark-label');
  const saved = localStorage.getItem('upc-dark');
  if (saved !== 'false') {
    document.body.classList.add('dark');
    label.textContent = 'Light';
  }
  btn.addEventListener('click', () => {
    const isDark = document.body.classList.toggle('dark');
    label.textContent = isDark ? 'Light' : 'Dark';
    localStorage.setItem('upc-dark', isDark);
  });
})();

/* ─────────────────────────────────────────────
   Init
───────────────────────────────────────────── */
products.push(newProduct());
renderAll();
</script>
</body>
</html>
